    <p id="pogrubienie_maslii">Ilu programistów potrzeba, żeby wkręcić żarówkę?
     Żadnego. To problem sprzętowy.</p>

    <p id="pochylony_maslii">Programista mówi do żony:
    Idę do sklepu po chleb. Jak będą jajka, to wezmę 10.
    Wraca z 10 chlebami.
    Były jajka.</p>

    <p id="index_gorny_maslii">Czemu programiści nie lubią wychodzić z domu?
    Bo tam nie ma „undo”.</p>
    <p id="index_dolny_maslii">Co mówi programista, kiedy widzi szklankę do połowy pełną?
    „Zainicjalizowana w 50%”.</p>

    <P id="mono_maslii">Dlaczego programista nie może zasnąć?
    Bo ma za dużo wątków.</P>

    <p id="powiekszenie_maslii">Jak programista bierze prysznic?
    Najpierw testuje wodę w stagingu.</p>

    <p id="pomniejszenie_maslii">Czemu programista zawsze myje ręce przed jedzeniem?
    Bo czytał, że trzeba debugować przed uruchomeniemi.</p>
